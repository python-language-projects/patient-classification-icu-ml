{% extends 'adminlayout.html' %}

{% block content %}
<section class="page-title bg-1">
  <div class="overlay"></div>
  <div class="container">
    <div class="row">
      <div class="col-md-12">
        <div class="block text-center">
          <h1 class="text-capitalize mb-4 fw-bold text-white">Update Your Password</h1>
          <span class="text-white-50 fs-5">Admin Settings</span>
        </div>
      </div>
    </div>
  </div>
</section>
<section class="section py-5">
  <div class="container">
    <div class="card shadow-sm border-0 rounded-4">
      <div class="card-body p-5">
        <h3 class="fw-bold text-danger mb-4"><i class="bi bi-shield-lock-fill me-2"></i>Update Admin Password</h3>
        
        <form method="POST" action="{{ url_for('admin_updatepassword') }}">
          <div class="mb-4">
            <label class="form-label">Current Password</label>
            <input type="password" name="current_password" class="form-control" placeholder="Enter Current Password" required>
          </div>
          <div class="mb-4">
            <label class="form-label">New Password</label>
            <input type="password" name="new_password" class="form-control" placeholder="Enter New Password" required>
          </div>
          <div class="mb-4">
            <label class="form-label">Confirm New Password</label>
            <input type="password" name="confirm_password" class="form-control" placeholder="Confirm New Password" required>
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-danger rounded-pill btn-lg">
              <i class="bi bi-key-fill me-2"></i> Update Password
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
{% endblock %}
