{% extends 'adminlayout.html' %}

{% block content %}
<!-- Page Header -->
<section class="page-title bg-1">
  <div class="overlay"></div>
  <div class="container">
    <div class="row">
      <div class="col-md-12">
        <div class="block text-center">
          <h1 class="text-capitalize mb-4 fw-bold text-white">Add Members</h1>
          <span class="text-white-50 fs-5">Admin adds new members and their details</span>
        </div>
      </div>
    </div>
  </div>
</section>
<section class="section py-5">
  <div class="container">
    <div class="card shadow-sm border-0 rounded-4">
      <div class="card-body p-5">
        <h3 class="fw-bold text-primary mb-4"><i class="bi bi-person-plus-fill me-2"></i>Add New Member</h3>
        
        <form method="POST" action="{{ url_for('add_user') }}">
          <div class="row g-4">
            <div class="col-md-6">
              <label class="form-label">Member ID</label>
              <input type="text" name="memberid" class="form-control" placeholder="Enter Member ID" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Password</label>
              <input type="password" name="password" class="form-control" placeholder="Enter Password" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Full Name</label>
              <input type="text" name="name" class="form-control" placeholder="Enter Full Name" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Mobile</label>
              <input type="text" name="mobile" class="form-control" placeholder="Enter Mobile Number" required>
            </div>
            <div class="col-md-12">
              <label class="form-label">Email ID</label>
              <input type="email" name="emailid" class="form-control" placeholder="Enter Email ID" required>
            </div>
          </div>

          <div class="mt-4 d-grid">
            <button type="submit" class="btn btn-success rounded-pill btn-lg">
              <i class="bi bi-plus-circle me-2"></i> Add Member
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
{% endblock %}
